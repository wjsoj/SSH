name: Sync Repositories

on:
  schedule:
    # Run at 3:00 AM UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      repositoryId:
        description: "Specific repository ID to sync (optional)"
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check configuration
        id: check
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "::warning::CRON_URL secret is not configured; skipping scheduled sync. \
            Set the CRON_URL and CRON_SECRET repository secrets to enable it."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Sync
        if: steps.check.outputs.configured == 'true'
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REPOSITORY_ID: ${{ github.event.inputs.repositoryId }}
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 300 \
            -X POST "${CRON_URL%/}/api/cron/sync" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"repositoryId\":\"${REPOSITORY_ID}\"}"
